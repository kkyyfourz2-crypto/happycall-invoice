<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>해피콜 배송앱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1a1f2e; min-height: 100vh; }

/* HEADER */
.header {
  background: #1a1f2e;
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: auto; }

/* SCREENS */
.screen { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.screen.active { display: block; }

/* CARDS */
.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #1a1f2e; }

/* LOGIN */
.driver-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.driver-btn {
  padding: 16px 10px;
  border: 2px solid #e2e6ea;
  border-radius: 12px;
  background: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  color: #1a1f2e;
  font-family: 'Noto Sans KR', sans-serif;
}
.driver-btn:active { transform: scale(0.96); }
.driver-btn.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; }

/* INPUTS */
.input-group { margin-bottom: 14px; }
.input-label { font-size: 12px; font-weight: 600; color: #5a6475; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
textarea, input[type=text], input[type=number], select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e2e6ea;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  color: #1a1f2e;
  background: #f8f9fb;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus, input:focus, select:focus { border-color: #2563eb; background: white; }
textarea { resize: none; }

/* BUTTONS */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #2563eb; color: white; }
.btn-green { background: #059669; color: white; }
.btn-kakao { background: #FEE500; color: #3A1D1D; }
.btn-gray { background: #e2e6ea; color: #5a6475; }
.btn-red { background: #dc2626; color: white; }
.btn-sm { padding: 10px 16px; font-size: 14px; width: auto; border-radius: 8px; }

/* INFO BOX */
.info-box {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: #1e40af;
}
.info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.info-row:last-child { margin-bottom: 0; }
.chip {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}
.chip-월말 { background: #e0e7ff; color: #3730a3; }
.chip-현금 { background: #d1fae5; color: #065f46; }
.chip-계좌 { background: #dbeafe; color: #1e40af; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 1px solid #e2e6ea;
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Noto Sans KR', sans-serif;
  color: #9aa3b2;
  font-size: 10px;
  font-weight: 500;
}
.nav-item.active { color: #2563eb; }
.nav-icon { font-size: 22px; }

/* HISTORY */
.history-item {
  border: 1px solid #e2e6ea;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.history-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.history-date { font-size: 12px; color: #9aa3b2; }
.history-price { margin-left: auto; font-weight: 700; color: #2563eb; }
.history-addr { font-size: 13px; color: #5a6475; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 999;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; text-align: center; }

.spacer { height: 80px; }

/* STATUS */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
}
.status-대기 { background: #fef3c7; color: #92400e; }
.status-배송중 { background: #dbeafe; color: #1e40af; }
.status-완료 { background: #d1fae5; color: #065f46; }

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
</style>

<body>

<div class="header">
  <div>🚇</div>
  <div class="header-title">해피콜 지하철택배</div>
  <div class="header-sub" id="headerUser"></div>
</div>

<!-- LOGIN SCREEN -->
<div class="screen active" id="screen-login">
  <div style="text-align:center;padding:30px 0 20px">
    <div style="font-size:48px;margin-bottom:12px">🚇</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:6px">해피콜 지하철택배</div>
    <div style="font-size:14px;color:#9aa3b2">본인 이름을 선택해주세요</div>
  </div>
  <div class="card">
    <div class="card-title">배송기사 선택</div>
    <div class="driver-grid" id="driverGrid"></div>
  </div>
  <button class="btn btn-primary" onclick="doLogin()" style="margin-top:8px">
    ✓ 시작하기
  </button>
</div>

<!-- DELIVERY SCREEN -->
<div class="screen" id="screen-delivery">
  <div class="card">
    <div class="card-title">📦 새 배송 접수</div>

    <div class="input-group">
      <label class="input-label">출발지 (카톡 내용 붙여넣기)</label>
      <textarea id="departRaw" rows="4" placeholder="예) 1/2(금) 9시 화란플라워//서초구 강남대로 27 화훼공판장 지하29호//010-3132-0127 월말결제" oninput="parseDepartInfo()"></textarea>
    </div>

    <div id="parsedInfo" style="display:none" class="info-box">
      <div class="info-row">🏢 <strong id="parsedVendor"></strong> <span class="chip" id="parsedPayChip"></span></div>
      <div class="info-row">📍 <span id="parsedAddr" style="font-size:12px"></span></div>
    </div>

    <div class="input-group">
      <label class="input-label">도착지 주소</label>
      <textarea id="arriveAddr" rows="3" placeholder="도착지 주소 입력"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <button class="btn btn-kakao" onclick="openKakaoMap()">
        🗺 카카오맵
      </button>
      <button class="btn" style="background:#03C75A;color:white;border-color:#03C75A" onclick="openNaverMap()">
        🗺 네이버지도
      </button>
    </div>
    <button class="btn btn-green" onclick="showCompleteModal()" style="width:100%;margin-bottom:14px;font-size:16px">
      ✅ 배송 완료
    </button>
  </div>

  <div class="card" id="todayCard">
    <div class="card-title">📋 오늘 배송 현황</div>
    <div id="todayList"><div style="text-align:center;color:#9aa3b2;padding:20px;font-size:13px">오늘 배송 내역이 없어요</div></div>
  </div>
  <div class="spacer"></div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="card">
    <div class="card-title">📅 나의 배송 기록</div>
    <div id="historyList"><div style="text-align:center;color:#9aa3b2;padding:20px;font-size:13px">배송 기록이 없어요</div></div>
  </div>
  <div class="spacer"></div>
</div>

<!-- COMPLETE MODAL -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <div class="modal-title">✅ 배송 완료 처리</div>
    <div class="input-group">
      <label class="input-label">배송 금액</label>
      <input type="number" id="deliveryPrice" placeholder="예) 8000" step="1000">
    </div>
    <div class="input-group">
      <label class="input-label">결제방식</label>
      <select id="deliveryPayment">
        <option value="월말">월말</option>
        <option value="현금">현금</option>
        <option value="계좌">계좌</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">비고 (선택)</label>
      <input type="text" id="deliveryNote" placeholder="Bus+, 양손 등">
    </div>
    <button class="btn btn-green" onclick="submitDelivery()" style="margin-bottom:10px">
      ✓ 완료 제출
    </button>
    <button class="btn btn-gray" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="nav-item active" onclick="showScreen('delivery')" id="nav-delivery">
    <span class="nav-icon">📦</span>
    배송접수
  </button>
  <button class="nav-item" onclick="showScreen('history')" id="nav-history">
    <span class="nav-icon">📋</span>
    배송기록
  </button>
</div>

<script>
const SHEET_ID = '1LTz07x3GbZsVnqfKk4zP_3uq4nb1ey2Qi94nunyGKVM';
const SCRIPT_URL = ''; // Google Apps Script URL (나중에 입력)

const DRIVERS = [
  '김주화','김현','김호년','남명현','남연순','노상운',
  '박규호','안영권','원명보','윤기상','윤승소','이원근',
  '이창만','전창식','최성재','허기석'
];

const WOLMAL_MAP = {
  '케이엔유': ['knu','케이엔유'], '갓텐코리아': ['갓텐','갓덴','갓덴스시'],
  '경성화원': ['경성화원','경성'], '차병원 파라메딕': ['차병원','파라메딕'],
  '까사데이피오리': ['까사데이피오리','까사'], '더부케(꽃뜰)': ['꽃뜰','더부케'],
  '동방미인': ['동방미인'], '더라임플라워': ['더라임','라임플라워'],
  '리첸플라워': ['리첸'], '메디넥스': ['메디넥스'],
  '우리은행(삼성타운점)': ['우리은행'], '해바라기': ['해바라기'],
  '플라워센터': ['플라워센터'], '미니쉬치과': ['미니쉬'],
  '이안동물의학센터': ['이안동물'], '퓨얼리영': ['퓨얼리'],
  '플러스플라워': ['플러스플라워'], '마그넷서비스서초지점': ['마그넷'],
  '꽃눈': ['꽃눈'], '화란플라워': ['화란'],
  '플로라빌': ['플로라빌'], '신한은행': ['신한은행'],
  '애플대리점': ['애플대리점'], '이지메디컴': ['이지메디컴'],
  '마포르플로스': ['마포르'], '핀플라워': ['핀플라워'],
};

let currentDriver = localStorage.getItem('hc_driver') || '';
let deliveries = JSON.parse(localStorage.getItem('hc_deliveries') || '[]');
let currentDelivery = {};

// Init
window.onload = () => {
  renderDriverGrid();
  if (currentDriver) {
    document.getElementById('headerUser').textContent = currentDriver;
    showApp();
  }
};

function renderDriverGrid() {
  const grid = document.getElementById('driverGrid');
  grid.innerHTML = DRIVERS.map(d =>
    `<button class="driver-btn ${d === currentDriver ? 'selected' : ''}" onclick="selectDriver('${d}')">${d}</button>`
  ).join('');
}

function selectDriver(name) {
  currentDriver = name;
  renderDriverGrid();
}

function doLogin() {
  if (!currentDriver) { alert('이름을 선택해주세요!'); return; }
  localStorage.setItem('hc_driver', currentDriver);
  document.getElementById('headerUser').textContent = currentDriver;
  showApp();
}

function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('bottomNav').style.display = 'flex';
  showScreen('delivery');
  loadTodayDeliveries();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'history') loadHistory();
}

// Parse depart info from kakao text
function parseDepartInfo() {
  const raw = document.getElementById('departRaw').value;
  if (!raw.trim()) {
    document.getElementById('parsedInfo').style.display = 'none';
    return;
  }

  // 결제방식 추출
  let payment = '월말';
  if (/현금|선불|착불|후불/.test(raw)) payment = '현금';
  else if (/계좌|이체|무통장/.test(raw)) payment = '계좌';
  else if (/월말|月末/.test(raw)) payment = '월말';

  // // 로 분리
  const parts = raw.split('//').map(p => p.trim());

  // 첫 번째 파트에서 시간 이후 상호명 추출
  let vendorName = '';
  const firstPart = parts[0] || '';
  const timeMatch = firstPart.match(/\d+시[이후]?\s*(.+)/);
  if (timeMatch) {
    vendorName = timeMatch[1].trim();
  } else if (parts.length > 1) {
    vendorName = parts[1].trim();
  }

  // 표준 수요처명 매칭
  let stdVendor = vendorName;
  const vendorClean = vendorName.replace(/\s/g, '').toLowerCase();
  for (const [std, aliases] of Object.entries(WOLMAL_MAP)) {
    for (const alias of aliases) {
      if (vendorClean.includes(alias.replace(/\s/g, '').toLowerCase())) {
        stdVendor = std;
        break;
      }
    }
  }

  // 주소 추출 (// 이후 두 번째 파트)
  let addr = '';
  for (const part of parts) {
    if (/[구동로길]/g.test(part) && part.length > 5) {
      addr = part.replace(/\/\/.*/, '').replace(/010-\d{4}-\d{4}/, '').trim();
      break;
    }
  }

  currentDelivery.vendor = stdVendor;
  currentDelivery.payment = payment;
  currentDelivery.departAddr = addr;
  currentDelivery.departRaw = raw;

  // 자동으로 결제방식 선택
  document.getElementById('deliveryPayment').value = payment;

  // 파싱 결과 표시
  document.getElementById('parsedVendor').textContent = stdVendor;
  document.getElementById('parsedAddr').textContent = addr;
  const chip = document.getElementById('parsedPayChip');
  chip.textContent = payment;
  chip.className = `chip chip-${payment}`;
  document.getElementById('parsedInfo').style.display = 'block';
}

function openKakaoMap() {
  const arrive = document.getElementById('arriveAddr').value.trim();
  if (!arrive) { alert('도착지 주소를 먼저 입력해주세요!'); return; }
  // 카카오맵 앱으로 목적지 검색
  const appUrl = `kakaomap://look?p=${encodeURIComponent(arrive)}`;
  const webUrl = `https://map.kakao.com/link/search/${encodeURIComponent(arrive)}`;
  // 앱 시도 후 웹으로 fallback
  const link = document.createElement('a');
  link.href = appUrl;
  link.click();
  setTimeout(() => { window.location.href = webUrl; }, 1500);
}

function openNaverMap() {
  const arrive = document.getElementById('arriveAddr').value.trim();
  if (!arrive) { alert('도착지 주소를 먼저 입력해주세요!'); return; }
  // 네이버지도 앱으로 목적지 검색
  const appUrl = `nmap://search?query=${encodeURIComponent(arrive)}&appname=com.happycall.delivery`;
  const webUrl = `https://map.naver.com/p/search/${encodeURIComponent(arrive)}`;
  const link = document.createElement('a');
  link.href = appUrl;
  link.click();
  setTimeout(() => { window.location.href = webUrl; }, 1500);
}

function showCompleteModal() {
  const arrive = document.getElementById('arriveAddr').value.trim();
  if (!arrive) { alert('도착지 주소를 입력해주세요!'); return; }
  currentDelivery.arrive = arrive;
  document.getElementById('completeModal').classList.add('show');
}

function closeModal() {
  document.getElementById('completeModal').classList.remove('show');
}

async function submitDelivery() {
  const price = parseInt(document.getElementById('deliveryPrice').value) || 0;
  const payment = document.getElementById('deliveryPayment').value;
  const note = document.getElementById('deliveryNote').value;

  if (!price) { alert('금액을 입력해주세요!'); return; }

  const now = new Date();
  const delivery = {
    id: Date.now(),
    date: now.toISOString().split('T')[0],
    time: now.toTimeString().slice(0,5),
    driver: currentDriver,
    vendor: currentDelivery.vendor || '',
    depart: currentDelivery.departAddr || document.getElementById('departRaw').value,
    arrive: currentDelivery.arrive || '',
    price: price,
    payment: payment,
    note: note,
  };

  // 로컬 저장
  deliveries.push(delivery);
  localStorage.setItem('hc_deliveries', JSON.stringify(deliveries));

  // 서버 전송
  try {
    await fetch('/api/delivery', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(delivery)
    });
  } catch(e) {
    console.log('서버 전송 실패, 로컬에만 저장됨');
  }

  // 초기화
  document.getElementById('departRaw').value = '';
  document.getElementById('arriveAddr').value = '';
  document.getElementById('deliveryPrice').value = '';
  document.getElementById('deliveryNote').value = '';
  document.getElementById('parsedInfo').style.display = 'none';
  currentDelivery = {};
  closeModal();
  loadTodayDeliveries();
  alert('✅ 배송 완료 처리되었습니다!');
}

function loadTodayDeliveries() {
  const today = new Date().toISOString().split('T')[0];
  const todayList = deliveries.filter(d => d.driver === currentDriver && d.date === today);
  const el = document.getElementById('todayList');

  if (todayList.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#9aa3b2;padding:20px;font-size:13px">오늘 배송 내역이 없어요</div>';
    return;
  }

  el.innerHTML = todayList.reverse().map(d => `
    <div class="history-item">
      <div class="history-header">
        <span class="chip chip-${d.payment}">${d.payment}</span>
        <span style="font-size:13px;font-weight:600">${d.vendor || '수요처없음'}</span>
        <span class="history-price">${d.price.toLocaleString()}원</span>
      </div>
      <div class="history-addr">📍 ${d.arrive}</div>
      <div style="font-size:11px;color:#9aa3b2;margin-top:4px">${d.time}</div>
    </div>
  `).join('');
}

function loadHistory() {
  const myDeliveries = deliveries.filter(d => d.driver === currentDriver);
  const el = document.getElementById('historyList');

  if (myDeliveries.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#9aa3b2;padding:20px;font-size:13px">배송 기록이 없어요</div>';
    return;
  }

  // 날짜별 그룹
  const grouped = {};
  myDeliveries.reverse().forEach(d => {
    if (!grouped[d.date]) grouped[d.date] = [];
    grouped[d.date].push(d);
  });

  el.innerHTML = Object.entries(grouped).map(([date, items]) => {
    const total = items.reduce((s, d) => s + d.price, 0);
    return `
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:#5a6475;margin-bottom:8px;display:flex;justify-content:space-between">
          <span>${date}</span>
          <span style="color:#2563eb">${items.length}건 / ${total.toLocaleString()}원</span>
        </div>
        ${items.map(d => `
          <div class="history-item">
            <div class="history-header">
              <span class="chip chip-${d.payment}">${d.payment}</span>
              <span style="font-size:13px;font-weight:600">${d.vendor || ''}</span>
              <span class="history-price">${d.price.toLocaleString()}원</span>
            </div>
            <div class="history-addr">📍 ${d.arrive}</div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
